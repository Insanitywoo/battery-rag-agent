services:
  nginx:
    image: nginx:1.27-alpine
    container_name: battery-rag-nginx
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - public_beta
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    container_name: battery-rag-frontend
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    expose:
      - "3000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - public_beta
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: battery-rag-backend
    environment:
      APP_ENV: production
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_TTL_MINUTES: ${ACCESS_TOKEN_TTL_MINUTES:-60}
      COOKIE_NAME: ${COOKIE_NAME:-access_token}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      STORAGE_ROOT: /app/storage
      MAX_UPLOAD_SIZE_BYTES: ${MAX_UPLOAD_SIZE_BYTES:-10485760}
      ALLOWED_UPLOAD_EXTENSIONS: ${ALLOWED_UPLOAD_EXTENSIONS:-.pdf,.txt,.md,.csv}
      ALLOWED_UPLOAD_MIME_TYPES: ${ALLOWED_UPLOAD_MIME_TYPES:-application/pdf,text/plain,text/markdown,text/csv,application/csv}
      CHUNK_SIZE: ${CHUNK_SIZE:-1000}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-150}
      CSV_PREVIEW_CHAR_LIMIT: ${CSV_PREVIEW_CHAR_LIMIT:-5000}
      EXPERIMENT_PREVIEW_ROWS: ${EXPERIMENT_PREVIEW_ROWS:-20}
      EXPERIMENT_CHART_POINT_LIMIT: ${EXPERIMENT_CHART_POINT_LIMIT:-60}
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME:-battery_rag_chunks}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_API_BASE_URL: ${LLM_API_BASE_URL:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_CHAT_MODEL: ${LLM_CHAT_MODEL:-mock-chat}
      LLM_EMBEDDING_MODEL: ${LLM_EMBEDDING_MODEL:-mock-embedding}
      RAG_TOP_K: ${RAG_TOP_K:-4}
      RAG_MIN_SIMILARITY: ${RAG_MIN_SIMILARITY:-0.15}
      CHAT_HISTORY_LIMIT: ${CHAT_HISTORY_LIMIT:-6}
      AGENT_ENABLE_LLM_ROUTING: ${AGENT_ENABLE_LLM_ROUTING:-false}
      AGENT_MIN_PROMPT_CHARACTERS: ${AGENT_MIN_PROMPT_CHARACTERS:-18}
      AGENT_MAX_CLAIMS: ${AGENT_MAX_CLAIMS:-6}
      AGENT_MAX_COMPARISON_DOCUMENTS: ${AGENT_MAX_COMPARISON_DOCUMENTS:-3}
      EXTERNAL_TOOL_USER_AGENT: ${EXTERNAL_TOOL_USER_AGENT:-Battery-RAG-Agent/0.1 (+https://example.local/manual-verification-required)}
      EXTERNAL_SEARCH_TIMEOUT_SECONDS: ${EXTERNAL_SEARCH_TIMEOUT_SECONDS:-15}
      CROSSREF_MAILTO: ${CROSSREF_MAILTO:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - app_storage:/app/storage
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/health').status == 200 else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - public_beta
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16
    container_name: battery-rag-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - public_beta
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: battery-rag-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - public_beta
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: battery-rag-qdrant
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - public_beta
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  app_storage:

networks:
  public_beta:
    driver: bridge
